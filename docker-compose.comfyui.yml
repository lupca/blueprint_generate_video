version: '3.8'

services:
  comfyui:
    image: yanwk/comfyui-boot:cu128-slim
    container_name: comfyui-server
    ports:
      - "8188:8188"
    volumes:
      - /data/comfyui/models:/root/ComfyUI/models
      - /data/comfyui/output:/root/ComfyUI/output
      - /data/comfyui/input:/root/ComfyUI/input
      - /data/comfyui/custom_nodes:/root/ComfyUI/custom_nodes
    environment:
      - CLI_ARGS=--listen 0.0.0.0 --port 8188
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    restart: unless-stopped
